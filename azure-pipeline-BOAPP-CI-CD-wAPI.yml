name: BOAppCICD

trigger:
  none

# trigger:
#   branches:
#     include:
#       - master

pool:
  vmImage: 'windows-2022'
  timeoutInMinutes: 60

variables:
  - group: DeployBOApp

stages:
  - stage: GeneralSetup
    jobs:
      # - job: Nugets
      #   steps:
      #     - task: NuGetToolInstaller@1
      #       name: 'NugetToolInstaller'
      #       displayName: 'Nuget Tool Installer'

      #     - task: NuGetCommand@2
      #       name: 'NugetRestore'
      #       displayName: 'Nuget Restore'
      #       inputs:
      #         command: 'restore'
      #         restoreSolution: '$(solution)'
      #         feedsToUse: 'select'
      - job: SetVariables
        steps:
          # - task: PowerShell@2
          #   name: 'GetCommitId'
          #   displayName: 'Get Latest Commit ID'
          #   inputs:
          #     targetType: 'inline'
          #     script: |
          #       $commitId = git rev-parse --short HEAD
          #       Write-Host "##vso[task.setvariable variable=CommitId]$commitId"

          - task: PowerShell@2
            name: SetVars
            displayName: 'Set Variable to Skip Stages'
            inputs:
              targetType: 'inline'
              script: |
                  function UpdateVariables {
                      try {
                          $base64AuthInfo = [Convert]::ToBase64String([Text.Encoding]::ASCII.GetBytes(":$(pat)"))
                          Write-Host "Base64 for pat: $base64AuthInfo"
                      }   catch {
                          Write-Host "Base64 for pat: to nie dziala"
                      }

                      $uri = "https://dev.azure.com/piapl-azb/BackOfficeApp/_apis/distributedtask/variablegroups/3?version=6.0-preview.2"
                      try {
                          $response = Invoke-RestMethod -Uri $uri -Method Get -Headers @{Authorization=("Basic {0}" -f $base64AuthInfo)}
                      }   catch {
                          Write-Host "Error getting variable group: $_"
                          throw
                      }
                      $response.variables.EnvName.value = $environment
                      $response.variables.commitId.value = $commitId

                      $body = $response | ConvertTo-Json -Depth 10
                      try {
                          Invoke-RestMethod -Uri $uri -Method Put -Headers @{
                              Authorization=("Basic {0}" -f $base64AuthInfo)
                              "Content-Type"="application/json"
                              "Accept"="application/json; api-version=$(apiVersion)"
                          } -Body $body
                      }   catch {
                          Write-Host "Error updating variable group: $_"
                          throw
                      }
                      Write-Host "UpdateVariables function result: EnvName = $(EnvName), commitId = $(commitId)."
                  }
                  
                  $commitId = git rev-parse --short HEAD
                  $environment = "updateit"
                  if (Test-Path $(appSettingsPath)) {
                    Write-Host "DEBUG: appsettingsPath exists: $(appSettingsPath)"
                    $appSettings = Get-Content $(appSettingsPath) -Raw | ConvertFrom-Json
                    $environment = $appSettings.Environment
                    Write-Host "DEBUG: appSettings.Environment: $environment"
                  }

                  UpdateVariables

                  Write-Host "Variables updated successfully."
                  Write-Host " "
          - task: PowerShell@2
            name: ListVariableGroupVars
            displayName: 'List all variables from variable group'
            inputs:
              targetType: 'inline'
              script: |
                # Define the Variable Group ID and the PAT (Personal Access Token)
                $variableGroupId = 3  # Change this to your variable group ID
                # $pat = "$(pat)"  # Uses Azure Pipelines System Access Token
                $organization = "piapl-azb"  # Replace with your organization name
                $project = "$(project)"  # Replace with your project name

                # Base64-encode the PAT for authentication
                $base64AuthInfo = [Convert]::ToBase64String([Text.Encoding]::ASCII.GetBytes(":$(pat)"))

                # API URL to fetch variable group information
                $uri = "https://dev.azure.com/$organization/$project/_apis/distributedtask/variablegroups/$variableGroupId?api-version=6.0-preview.2"

                # Make the API request to get the variable group
                try {
                  $response = Invoke-RestMethod -Uri $uri -Method Get -Headers @{
                      Authorization=("Basic {0}" -f $base64AuthInfo)
                  }
                } catch {
                  Write-Host "Error fetching variable group: $_"
                  throw
                }

                # List all variables and their values
                foreach ($variable in $response.variables.GetEnumerator()) {
                  Write-Host "Variable: $($variable.Key) = $($variable.Value.value)"
                }
  - stage: BuildDEV
    dependsOn: GeneralSetup
    condition: and(succeeded(), in(variables['EnvName'], 'DEV', 'BOTH'))
    jobs:
      - job: SetAppSettingsForDEV
        steps:
          - task: PowerShell@2
            name: SetAppSettinsDEV
            displayName: 'Set appsettings.json'
            inputs:
              targetType: 'inline'
              script: |
                    $appSettings = Get-Content $(appSettingsPath) -Raw | ConvertFrom-Json
                    $appSettings.ConnectionStrings.AppDbContextConnection = "$(AppDbContextConnectionDEV)"
                    $appSettings.ConnectionStrings.AsDbContextConnection = "$(AsDbContextConnection)"
                    $appSettings.BaseUrl = "$(baseUrlDEV)"
                    $appSettings.AppVersion = "$(commitId)"
                    $appSettings.Environment = "DEV"
                    $appSettings | ConvertTo-Json -Depth 32 | Set-Content $(appSettingsPath)
                    Write-Host "DEV artifact generated and appsettings updated."
                    # dotnet publish "$(Build.SourcesDirectory)\BOAppFluentUI\BOAppFluentUI.csproj" -c Release -o "$(Build.ArtifactStagingDirectory)\DEV" -nowarn:CS8618,CS8604
                    Write-Host "AppVersion and ConnectionStrings updated successfully. $(EnvName))"

      - job: PublishArtifactsDEV
        dependsOn:
         - SetAppSettingsForDEV
        condition: succeeded()
        steps:
          - task: DotNetCoreCLI@2
            name: 'Publish'
            displayName: 'Publish'
            inputs:
              command: 'publish'
              publishWebProjects: false
              projects: '$(project)'
              arguments: '--configuration $(builtConfiguration) --output $(Build.ArtifactStagingDirectory)'
              zipAfterPublish: false
          - task: PublishBuildArtifacts@1
            name: 'PublishArtifactDEV'
            displayName: 'Publish Artifact DEV'
            inputs:
              PathtoPublish: '$(Build.ArtifactStagingDirectory)'
              ArtifactName: 'BoAppProject'
              publishLocation: 'Container'

  - stage: Deploy2DEV
    displayName: 'Deploy to DEV'
    dependsOn: BuildDEV
    condition: and(succeeded(), in(variables['EnvName'], 'DEV', 'BOTH'))
    jobs:
      - deployment: DeployWebApp2DEV
        displayName: 'DeployWebApp2DEV'
        environment: 'PLWAWS86DEV.PLWAWS86DEV'
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: none
                - task: DownloadPipelineArtifact@2
                  name: 'DownloadArtifacts'
                  displayName: 'Download Artifacts'
                  inputs:
                    ArtifactName: 'BoAppProject'
                    targetPath: '$(Pipeline.Workspace)'              
                - task: IISWebAppManagementOnMachineGroup@0
                  name: 'StopIIS'
                  displayName: 'Stop IIS'
                  inputs:
                    IISDeploymentType: 'IISWebsite'
                    ActionIISWebsite: 'StopWebsite'
                    StartStopWebsiteName: '$(IISWebsiteName)'
                - task: IISWebAppDeploymentOnMachineGroup@0
                  name: 'DeployApp'
                  displayName: 'Deploy App'
                  inputs:
                    WebSiteName: '$(IISWebsiteName)'
                    Package: '$(Pipeline.Workspace)'
                    TakeAppOfflineFlag: true
                - task: IISWebAppManagementOnMachineGroup@0
                  name: 'StartApp'
                  displayName: 'Start App'
                  inputs:
                    IISDeploymentType: 'IISWebsite'
                    ActionIISWebsite: 'StartWebsite'
                    StartStopWebsiteName: '$(IISWebsiteName)'

  - stage: BuildPROD
    dependsOn: Deploy2DEV
    condition: and(always(), in(variables['EnvName'], 'PROD', 'BOTH'))
    jobs:
      - job: SetAppSettingsForPROD
        steps:
          - task: PowerShell@2
            name: SetAppSettinsPROD
            displayName: 'Set appsettings.json for PROD'
            inputs:
              targetType: 'inline'
              script: |
                    $appSettings = Get-Content $(appSettingsPath) -Raw | ConvertFrom-Json
                    $appSettings.ConnectionStrings.AppDbContextConnection = "$(AppDbContextConnectionPROD)"
                    $appSettings.ConnectionStrings.AsDbContextConnection = "$(AsDbContextConnection)"
                    $appSettings.BaseUrl = "$(baseUrlPROD)"
                    $appSettings.AppVersion = "$(commitId)"
                    $appSettings.Environment = "PROD"
                    $appSettings | ConvertTo-Json -Depth 32 | Set-Content $(appSettingsPath)
                    Write-Host "PROD artifact generated and appsettings updated."
                    # dotnet publish "$(Build.SourcesDirectory)\BOAppFluentUI\BOAppFluentUI.csproj" -c Release -o "$(Build.ArtifactStagingDirectory)\DEV" -nowarn:CS8618,CS8604
                    Write-Host "AppVersion and ConnectionStrings updated successfully. $(EnvName)"

      - job: PublishArtifactsPROD
        dependsOn:
         - SetAppSettingsForPROD
        condition: succeeded()
        steps:
          - task: DotNetCoreCLI@2
            name: 'Publish'
            displayName: 'Publish'
            inputs:
              command: 'publish'
              publishWebProjects: false
              projects: '$(project)'
              arguments: '--configuration $(builtConfiguration) --output $(Build.ArtifactStagingDirectory)'
              zipAfterPublish: false
          - task: PublishBuildArtifacts@1
            name: 'PublishArtifactPROD'
            displayName: 'Publish Artifact PROD'
            inputs:
              PathtoPublish: '$(Build.ArtifactStagingDirectory)'
              ArtifactName: 'BoAppProject'
              publishLocation: 'Container'

  - stage: Deploy2PROD
    displayName: 'Deploy to PROD'
    dependsOn: BuildPROD
    condition: and(succeeded(), in(variables['EnvName'], 'PROD', 'BOTH'))
    jobs:
      - deployment: DeployWebApp2PROD
        displayName: 'DeployWebApp2PROD'
        environment: 'PLWAWS86DEV.PLWAWS86DEV'
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: none
                - task: DownloadPipelineArtifact@2
                  name: 'DownloadArtifacts'
                  displayName: 'Download Artifacts'
                  inputs:
                    ArtifactName: 'BoAppProject'
                    targetPath: '$(Pipeline.Workspace)'              
                - task: IISWebAppManagementOnMachineGroup@0
                  name: 'StopIIS'
                  displayName: 'Stop IIS'
                  inputs:
                    IISDeploymentType: 'IISWebsite'
                    ActionIISWebsite: 'StopWebsite'
                    StartStopWebsiteName: '$(IISWebsiteName)'
                - task: IISWebAppDeploymentOnMachineGroup@0
                  name: 'DeployApp'
                  displayName: 'Deploy App'
                  inputs:
                    WebSiteName: '$(IISWebsiteName)'
                    Package: '$(Pipeline.Workspace)'
                    TakeAppOfflineFlag: true
                - task: IISWebAppManagementOnMachineGroup@0
                  name: 'StartApp'
                  displayName: 'Start App'
                  inputs:
                    IISDeploymentType: 'IISWebsite'
                    ActionIISWebsite: 'StartWebsite'
                    StartStopWebsiteName: '$(IISWebsiteName)'
