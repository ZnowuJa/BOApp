          - task: PowerShell@2
            displayName: 'Set Variable to Skip Stages'
            inputs:
              targetType: 'inline'
              script: |
                Write-Host "$(EnvName)"
                Write-Host "$(solution)"
                Write-Host "$(project)"
                $newValue = 'DEV1'
                $organization = "piapl-azb"
                $project = "BackOfficeApp"
                $variableGroupId = "3"
                $pat = "ni7jkn6ach7d3txvgwodhozrgcd3q5ohvjrtjv4hudtsyldfyu7a"
                $variableName = "EnvName"
                $newValue = "DEV1"

                # Base64-encode the PAT
                $base64AuthInfo = [Convert]::ToBase64String([Text.Encoding]::ASCII.GetBytes(":$($pat)"))

                # Get the existing variable group
                $uri = "https://dev.azure.com/$organization/$project/_apis/distributedtask/variablegroups/$variableGroupId?api-version=6.0-preview.2"
                Write-Host "Constructed URL: $uri"
                $response = Invoke-RestMethod -Uri $uri -Method Get -Headers @{Authorization=("Basic {0}" -f $base64AuthInfo)}

                # Update the variable value
                $response.variables.$variableName.value = $newValue

                # Update the variable group
                $body = $response | ConvertTo-Json -Depth 10
                Invoke-RestMethod -Uri $uri -Method Put -Headers @{Authorization=("Basic {0}" -f $base64AuthInfo); "Content-Type"="application/json"} -Body $body

                Write-Host "Variable '$variableName' updated to '$newValue' in variable group '$variableGroupId'."

