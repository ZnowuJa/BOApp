name: BOAppTestVars

trigger:
  none

pool:
  vmImage: 'windows-2022'
  timeoutInMinutes: 60

variables:
  -group: DeployBOApp
# - template: envspec.yml

stages:
  - stage: Build
    jobs:
      - job: SetSkipVariable
        steps:
          - task: PowerShell@2
            displayName: 'Set Variable to Skip Stages'
            inputs:
              targetType: 'inline'
              script: |
                Write-Host "$(currentEnv)"
                Write-Host "$(solution)"
                Write-Host "$(project)"

  - stage: Deploy
    displayName: 'Deploy Stage'
    dependsOn: Build
    # condition: eq(dependencies.Build.outputs['Build.SetSkipVariable.currentEnv'], 'nowawartoscelse')
    jobs:
      - job: DeployJob
        steps:
          - task: PowerShell@2
            displayName: 'Deploy to Production'
            inputs:
              targetType: 'inline'
              script: |
                Write-Host "Deploying to production."
                # Write-Host $[stageDependencies.Build.outputs['Build.SetSkipVariable.currentEnv']
                # Write-Host "Deploying to production with variable PROD = $(PROD)."
