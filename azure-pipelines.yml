# Starter pipeline
# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml

trigger:
#  branches:
#      include:
#          - master
  none

pool:
 vmImage: 'windows-latest'

variables:
  builtPlatform: 'Any CPU'
  builtConfiguration: 'Release'
  solution: '**/BOAppFluentUI+.sln'
  project: '**/BOAppFluentUI/BOAppFluentUI.csproj'

steps:
    - task: NuGetToolInstaller@1
      name: 'NugetToolInstaller'
      displayName: 'Nuget Tool  Installer'
    
    - task: NuGetCommand@2
      name: 'NugetRestore'
      displayName: 'Nuget Restore'
      inputs:
        command: 'restore'
        restoreSolution: '$(solution)'
        feedsToUse: 'select'
    - task: DotNetCoreCLI@2
      name: 'Publish'
      displayName: 'Publish'
      inputs:
            command: 'publish'
            publishWebProjects: false
            projects: '$(project)'
            arguments: '--configuration $(builtConfiguration) --output $(Build.ArtifactStagingDirectory)'
            zipAfterPublish: false
    
    - task: PublishBuildArtifacts@1
      name: 'PublishArtifact'
      displayName: 'Publish Artifact'
      inputs:
        PathtoPublish: '$(Build.ArtifactStagingDirectory)'
        ArtifactName: 'BoAppTestProject'
        publishLocation: 'Container'
    
