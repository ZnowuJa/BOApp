name: BOAppTestVars

trigger:
  none

pool:
  vmImage: 'windows-2022'
  timeoutInMinutes: 60

variables:
  SYSTEM_ACCESSTOKEN: $(System.AccessToken)
  builtPlatform: 'Any CPU'
  builtConfiguration: 'Release'
  solution: '**/BOAppFluentUI+.sln'
  project: '**/BOAppFluentUI/BOAppFluentUI.csproj'
  IISWebsiteName: 'BackOfficeApp'

stages:
  - stage: 'Build'
    jobs:
    - job: SetVarsAndSettings
        # dependsOn: 'Nugets'
      steps:  # Missing key for steps
          - task: PowerShell@2
            displayName: 'Get Latest Commit ID'
            inputs:
              targetType: 'inline'
              script: |
                $commitId = git rev-parse --short HEAD
                Write-Host "##vso[task.setvariable variable=CommitId]$commitId"
          - task: PowerShell@2
            displayName: 'Update appsettings.json'
            inputs:
              targetType: 'inline'
              script: |
                $appSettingsPath = "$(Build.SourcesDirectory)\BOAppFluentUI\appsettings.json"
                if (Test-Path $appSettingsPath) {
                  $appSettings = Get-Content $appSettingsPath -Raw | ConvertFrom-Json
                  if (-not $appSettings.PSObject.Properties.Match('AppVersion')) {
                      $appSettings | Add-Member -MemberType NoteProperty -Name 'AppVersion' -Value ''
                  }
                  $appSettings.AppVersion = "$(CommitId)"
                  
                  $environment = $appSettings.Environment
                  
                  if ($environment -eq "DEV") {
                    $appSettings.ConnectionStrings.AppDbContextConnection = "Data Source=plwawq04n;Initial Catalog=BackOfficeAppDev;Integrated Security=True;Connect Timeout=30;Encrypt=False;Trust Server Certificate=True;Application Intent=ReadWrite;Multi Subnet Failover=False"
                    $appSettings.ConnectionStrings.AsDbContextConnection = "Data Source=plwawq01n;Initial Catalog=PIADMS;Integrated Security=True;Connect Timeout=30;Encrypt=False;Trust Server Certificate=True;Application Intent=ReadWrite;Multi Subnet Failover=False"
                    $appSettings.BaseUrl = "https://plwaws86dev"
                    Write-Host "##vso[task.setvariable variable=RunDEV;isOutput=true]true"
                    Write-Host "##vso[task.setvariable variable=RunPROD;isOutput=true]false"
                    Write-Host "Sets for env eq DEV"
                    
                  } elseif ($environment -eq "PROD") {
                    $appSettings.ConnectionStrings.AppDbContextConnection = "Data Source=plwawq04n;Initial Catalog=BackOfficeAppProd;Integrated Security=True;Connect Timeout=30;Encrypt=False;Trust Server Certificate=True;Application Intent=ReadWrite;Multi Subnet Failover=False"
                    $appSettings.ConnectionStrings.AsDbContextConnection = "Data Source=plwawq01n;Initial Catalog=PIADMS;Integrated Security=True;Connect Timeout=30;Encrypt=False;Trust Server Certificate=True;Application Intent=ReadWrite;Multi Subnet Failover=False"
                    $appSettings.BaseUrl = "https://plwaws86"
                    Write-Host "##vso[task.setvariable variable=RunDEV;isOutput=true]false"
                    Write-Host "##vso[task.setvariable variable=RunPROD;isOutput=true]true"
                    Write-Host "Sets for env eq PROD"
                  }

                  $appSettings | ConvertTo-Json -Depth 32 | Set-Content $appSettingsPath
                  Write-Host "AppVersion and ConnectionStrings updated successfully."
                } else {
                  Write-Error "appsettings.json file not found at path: $appSettingsPath"
                }

  - stage: DeployWebAppDEV
    displayName: 'Deploy App 2 DEV'
    dependsOn: Build
    condition: eq(dependencies.Build.SetVarsAndSettings.outputs['SetVarsAndSettings.RunDEV'], 'true')
    variables:
      StageRunDEV: $[stageDependencies.Build.SetVarsAndSettings.outputs['SetVarsAndSettings.RunDEV']]
      StageRunPROD: $[stageDependencies.Build.SetVarsAndSettings.outputs['SetVarsAndSettings.RunPROD']]
    jobs:
      - deployment: Deploy2DEV
        displayName: Deploy App 2 DEV
        environment: "PLWAWS86DEV.PLWAWS86DEV"
        
        strategy:
          runOnce:
            deploy:
              steps:
                - task: PowerShell@2
                  displayName: 'Deploy to Production'
                  name: dupa
                  inputs: 
                    targetType: 'inline'
                    script: Write-Host "I'm in DEV"

    
  - stage: DeployWebAppPROD
    displayName: 'Deploy App 2 PROD'
    dependsOn: Build
    condition: eq(dependencies.Build.SetVarsAndSettings.outputs['SetVarsAndSettings.RunPROD'], 'true')
    variables:
      StageRunDEV: $[stageDependencies.Build.SetVarsAndSettings.outputs['SetVarsAndSettings.RunDEV']]
      StageRunPROD: $[stageDependencies.Build.SetVarsAndSettings.outputs['SetVarsAndSettings.RunPROD']]
    jobs:
      - deployment: Deploy2PROD
        displayName: Deploy App 2 PROD
        environment: "PLWAWS86.PLWAWS86"
        strategy:
          runOnce:
            deploy:
              steps:
                - task: PowerShell@2
                  displayName: 'Deploy to Production'
                  name: dupa
                  inputs: 
                    targetType: 'inline'
                    script: Write-Host "I'm in PROD"