# Starter pipeline
# Start with a minimal pipeline that you can customize to build and deploy your code.
# Add steps that build, run tests, deploy, and more:
# https://aka.ms/yaml



trigger:
  none

pool:
  vmImage: 'windows-latest'

variables:
  builtPlatform: 'Any CPU'
  builtConfiguration: 'Release'
  solution: '**/BOAppFluentUI+.sln'
  project: '**/BOAppFluentUI/BOAppFluentUI.csproj'

steps:
  - task: NuGetToolInstaller@1
    name: 'NugetToolInstaller'
    displayName: 'Nuget Tool Installer'
    
  - task: NuGetCommand@2
    name: 'NugetRestore'
    displayName: 'Nuget Restore'
    inputs:
      command: 'restore'
      restoreSolution: '$(solution)'
      feedsToUse: 'select'

  - task: PowerShell@2
    name: 'GetCommitId'
    displayName: 'Get Latest Commit ID'
    inputs:
      targetType: 'inline'
      script: |
        $commitId = git rev-parse --short HEAD
        Write-Host "##vso[task.setvariable variable=CommitId]$commitId"

  - task: PowerShell@2
    name: 'UpdateAppSettings'
    displayName: 'Update appsettings.json'
    inputs:
      targetType: 'inline'
      script: |
        $appSettingsPath = "$(Build.SourcesDirectory)\BOAppFluentUI\appsettings.json"
        if (Test-Path $appSettingsPath) {
          $appSettings = Get-Content $appSettingsPath -Raw | ConvertFrom-Json
          if (-not $appSettings.PSObject.Properties.Match('AppVersion')) {
              $appSettings | Add-Member -MemberType NoteProperty -Name 'AppVersion' -Value ''
          }
          $appSettings.AppVersion = "$(CommitId)"
          
          # Read the Environment property
          $environment = $appSettings.Environment
          
          # Update connection strings based on environment
          if ($environment -eq "DEV") {
            $appSettings.ConnectionStrings.AppDbContextConnection = "Data Source=plwawq04n;Initial Catalog=BackOfficeAppDev;Integrated Security=True;Connect Timeout=30;Encrypt=False;Trust Server Certificate=True;Application Intent=ReadWrite;Multi Subnet Failover=False"
            $appSettings.ConnectionStrings.AsDbContextConnection = "Data Source=plwawq01n;Initial Catalog=PIADMS;Integrated Security=True;Connect Timeout=30;Encrypt=False;Trust Server Certificate=True;Application Intent=ReadWrite;Multi Subnet Failover=False"
            $appSettings.BaseUrl = "https://plwaws86dev"
          } elseif ($environment -eq "PROD") {
            $appSettings.ConnectionStrings.AppDbContextConnection = "Data Source=plwawq04n;Initial Catalog=BackOfficeAppProd;Integrated Security=True;Connect Timeout=30;Encrypt=False;Trust Server Certificate=True;Application Intent=ReadWrite;Multi Subnet Failover=False"
            $appSettings.ConnectionStrings.AsDbContextConnection = "Data Source=plwawq01n;Initial Catalog=PIADMS;Integrated Security=True;Connect Timeout=30;Encrypt=False;Trust Server Certificate=True;Application Intent=ReadWrite;Multi Subnet Failover=False"
            $appSettings.BaseUrl = "https://plwaws86"
          }

          $appSettings | ConvertTo-Json -Depth 32 | Set-Content $appSettingsPath
          Write-Host "AppVersion and ConnectionStrings updated successfully."
        } else {
          Write-Error "appsettings.json file not found at path: $appSettingsPath"
        }

  - task: DotNetCoreCLI@2
    name: 'Publish'
    displayName: 'Publish'
    inputs:
      command: 'publish'
      publishWebProjects: false
      projects: '$(project)'
      arguments: '--configuration $(builtConfiguration) --output $(Build.ArtifactStagingDirectory)'
      zipAfterPublish: false

  - task: PublishBuildArtifacts@1
    name: 'PublishArtifact'
    displayName: 'Publish Artifact'
    inputs:
      PathtoPublish: '$(Build.ArtifactStagingDirectory)'
      ArtifactName: 'BoAppProject'
      publishLocation: 'Container'

  - task: PowerShell@2
    name: 'TriggerReleasePipeline'
    displayName: 'Trigger Release Pipeline'
    inputs:
      targetType: 'inline'
      script: |
        $appSettingsPath = "$(Build.SourcesDirectory)\BOAppFluentUI\appsettings.json"
        if (Test-Path $appSettingsPath) {
          $appSettings = Get-Content $appSettingsPath -Raw | ConvertFrom-Json
          $environment = $appSettings.Environment
          
          if ($environment -eq "PROD") {
            Write-Host "Triggering BOApp_ReleasePipelinePROD..."
            Invoke-RestMethod -Uri "https://dev.azure.com/piapl-azb/BackOfficeApp/_apis/pipelines/BOApp_ReleasePipelinePROD/runs?api-version=6.0-preview.1" -Method Post -Headers @{Authorization = "Bearer $(System.AccessToken)"}
          } elseif ($environment -eq "DEV") {
            Write-Host "Triggering BOApp_ReleasePipelineDEV..."
            Invoke-RestMethod -Uri "https://dev.azure.com/piapl-azb/BackOfficeApp/_apis/pipelines/BOApp_ReleasePipelineDEV/runs?api-version=6.0-preview.1" -Method Post -Headers @{Authorization = "Bearer $(System.AccessToken)"}
          } else {
            Write-Host "No matching environment found. Skipping release pipeline trigger."
          }
        } else {
          Write-Error "appsettings.json file not found at path: $appSettingsPath"
        }